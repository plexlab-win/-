<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보험 설계사 프로필</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
        }
        .description {
            color: #555;
            margin: 10px 0;
        }
        .button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        .button:hover {
            background: #0056b3;
        }
        .links {
            margin-top: 20px;
        }
        .links a {
            display: block;
            margin-top: 5px;
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://via.placeholder.com/120" alt="설계사 사진" class="profile-img">
        <div class="name">홍길동</div>
        <div class="description">보험 전문 설계사 | 맞춤형 상담 제공</div>
        <a href="#" class="button">카카오톡 상담</a>
        <a href="#" class="button">전화 상담</a>
        <a href="#" class="button">무료 상담 신청</a>
        <div class="links">
            <a href="#">블로그 보기</a>
            <a href="#">유튜브 채널</a>
            <a href="#">인스타그램</a>
        </div>
    </div>
</body>
</html>
