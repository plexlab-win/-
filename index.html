<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보험 설계사 프로필</title>
    <style>
        body {
            font-family: '맑은 고딕', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: black;
            padding: 0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            color: white;
        }
        .profile-img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            mask-image: linear-gradient(to bottom, rgba(255, 255, 255, 1), rgba(0, 0, 0, 0));
            -webkit-mask-image: linear-gradient(to bottom, rgba(255, 255, 255, 1), rgba(0, 0, 0, 0));
            border-radius: 10px 10px 0 0;
        }
        .name {
            font-size: 23.52px;
            font-weight: bold;
            color: white;
        }
        .description {
            color: white;
            margin: 10px 0;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }
        .button {
            display: block;
            width: 80%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            background: white;
            color: black;
            text-decoration: none;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
        }
        .button:hover {
            background: #d0d0d0;
        }
        .links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .links a {
            display: inline-block;
            width: 40px;
            height: 40px;
        }
        .links img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn.litt.ly/images/MGEXoyejbM65n2dIDKC9Uv7Gucr2Hx5j?s=600x600&m=outside&f=webp" alt="설계사 사진" class="profile-img">
        <div class="name">김정훈 지점장</div>
        <div class="description">보험 전문 설계사 | 맞춤형 상담 제공</div>
        <div class="button-container">
            <a href="#" class="button">카카오톡 상담</a>
            <a href="#" class="button">전화 상담</a>
            <a href="#" class="button">무료 상담 신청</a>
        </div>
        <div class="links">
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="블로그"></a>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="유튜브"></a>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="인스타그램"></a>
        </div>
        <div class="footer-logo">
        <img src="https://cdn.litt.ly/images/i60jIvtFvQa3zZY18OqYHrrSRnVTUliZ?s=176x56&m=outside&f=webp" alt="하단 로고" style="width: 80%; max-width: 176px;">
    </div>
</div>
</body>
</html>
